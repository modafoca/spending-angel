<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Spending Angel</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main id="popup-root">
    <header class="header">
      <div class="logo" aria-hidden="true">😇</div>
      <h1>Spending Angel</h1>
    </header>

    <section class="goal-section">
      <label for="goal" class="goal-label">Saving for…</label>
      <input id="goal" class="goal-input" type="text" placeholder="e.g. Tokyo trip" maxlength="60" />
      <p class="goal-hint">Leave blank for the generic version.</p>
    </section>

    <section class="row toggle-row">
      <label class="toggle">
        <input id="enabled" type="checkbox" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label" id="enabled-label">Angel is awake</span>
      </label>
    </section>

    <section class="row">
      <label for="sound">Sound</label>
      <select id="sound">
        <option value="stop.mp3">The Classic</option>
        <option value="bonk.mp3">Cartoon Bonk</option>
        <option value="mom-sigh.mp3">Disappointed Sigh</option>
        <option value="wah-wah.mp3">Sad Trombone</option>
      </select>
    </section>

    <section class="row">
      <label for="volume">Volume</label>
      <input id="volume" type="range" min="0" max="1" step="0.05" />
    </section>

    <section class="row trigger-row">
      <span class="label">Trigger</span>
      <div class="radio-group">
        <label><input type="radio" name="trigger" value="load" /> page load</label>
        <label><input type="radio" name="trigger" value="click" /> button click</label>
        <label><input type="radio" name="trigger" value="both" /> both</label>
      </div>
    </section>

    <section class="row mute-row" id="mute-row" hidden>
      <button id="mute-btn" class="ghost-btn"></button>
    </section>

    <footer class="footer"><span class="version">v0.1</span></footer>
  </main>

  <script src="domains.js"></script>
  <script src="popup.js"></script>
</body>
</html>
