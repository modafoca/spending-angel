<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Spending Angel — Sensor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main id="popup-root">
    <header class="header">
      <div class="logo" aria-hidden="true">😇</div>
      <div>
        <h1>Sensor</h1>
        <p class="sub">Eyes for the Spending Angel app</p>
      </div>
    </header>

    <section class="panel">
      <h2 class="panel-title">Last detected intent</h2>
      <pre id="last-intent" class="intent">none yet</pre>
    </section>

    <section class="panel">
      <button id="simulate" class="ghost-btn">Simulate intent</button>
      <p class="hint">Fires a fake <code>checkout_intent</code> through the app so you can test the whole pipeline without a real shop.</p>
    </section>

    <section class="panel">
      <h2 class="panel-title">App connection</h2>
      <p id="bridge-status" class="status">—</p>
    </section>

    <section class="panel">
      <h2 class="panel-title">Recent events</h2>
      <pre id="events" class="intent">none yet</pre>
    </section>

    <footer class="footer"><span class="version">sensor v0.2 · controls live in the macOS app</span></footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
